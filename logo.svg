  <circle cx="15" cy="15" r="0.8" fill="#d3d3d3"/>
  <circle cx="25" cy="65" r="1.0" fill="#d3d3d3"/>
  <circle cx="35" cy="35" r="0.7" fill="#d3d3d3"/>
