  <circle cx="55" cy="55" r="0.9" fill="#d3d3d3"/>
  <circle cx="65" cy="25" r="0.8" fill="#d3d3d3"/>
  <circle cx="70" cy="85" r="1.1" fill="#d3d3d3"/>
  <circle cx="80" cy="60" r="1.0" fill="#d3d3d3"/>
